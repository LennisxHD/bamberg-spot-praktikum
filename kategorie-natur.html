<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natur - Bamberg Spot</title>

<style>
.header-image {
    width: 100%;
    height: 240px;
    object-fit: cover;
    border-radius: 0 0 18px 18px;
}
.poi-card {
    background: white;
    padding: 18px;
    border-radius: 14px;
    margin-top: 18px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}
.poi-card h3 {
    margin: 0;
    font-size: 20px;
}
.poi-card a {
    color: #2563eb;
    text-decoration: none;
}
/* Banner wie YouTube-Channel */
.header-banner {
    width: 100%;
    height: 260px;
    background-position: center center;
    background-repeat: no-repeat;
    background-size: cover;
    border-bottom-left-radius: 18px;
    border-bottom-right-radius: 18px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.15);
    margin-bottom: 20px;
}
</style>

</head>
<body>

<button onclick="window.location.href='start.html'" id="home-btn">⟵ Startseite</button>
<button onclick="window.location.href='index.html'" id="sidebar-toggle">⟵ Zur Karte</button>

<div class="header-banner"></div>

<div style="padding: 20px;">
    <h1>🌳 Natur & Ruheorte</h1>
    <p>Bamberg bietet viele idyllische Grünflächen, Flusswege und ruhige Plätze zum Abschalten.</p>
    <p2>Diese Kategorie führt dich zu den entspannten Oasen der Stadt,</p2>
    <p3>perfekt zum Spazierengehen, Erholen oder einfach Durchatmen.</p3>

    <div id="poi-list"></div>
</div>

<script>
const list = document.getElementById("poi-list");

POIS.natur.forEach(p => {
    const html = `
        <div class="poi-card">
            <h3>${p.name}</h3>
            ${p.link ? `<a href="${p.link}" target="_blank">Mehr erfahren</a>` : ""}
        </div>
    `;
    list.innerHTML += html;
});
</script>

</body>
</html>
